name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build site (bundles vanilla-breeze + components)
        run: npm run site:build

      - name: Add root redirect to /docs
        run: printf '%s' '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=./docs/index.html"><link rel="canonical" href="./docs/index.html"><title>canvas-text</title><a href="./docs/index.html">canvas-text documentation</a>' > dist-site/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist-site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
