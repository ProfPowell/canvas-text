<!doctype html>
<html lang="en" data-theme="classic">
<head>
  <script>
    (() => {
      const vb = new URL('./vb', document.baseURI).href.replace(/\/$/, '');
      window.__VB_THEME_BASE = vb;
      window.__VB_CATALOG_BASE = vb;
      document.documentElement.dataset.iconPath = vb + '/icons';
      try {
        const key = 'vb:theme:current';
        if (!localStorage.getItem(key)) {
          localStorage.setItem(key, JSON.stringify({ data: { brand: 'classic' }, timestamp: Date.now() }));
        }
      } catch (_) {}
    })();
  </script>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <title>canvas-text — User badge</title>
  <script type="importmap">
    { "imports": { "render-tag": "https://esm.sh/render-tag@0.1.7" } }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    canvas-text { border: 1px solid #ccc; }
  </style>
</head>
<body>
  <main>
    <h1>User badge / profile card</h1>
    <canvas-text preset="badge" width="320" height="320">
      <img slot="background" src="https://picsum.photos/seed/badgebg/320/320" crossorigin="anonymous" fit="cover" alt="">
      <img slot="image-1" src="https://picsum.photos/seed/avatar12/128/128" crossorigin="anonymous" width="96" height="96" alt="">
      <span slot="text-1" style="color:#fff;font-size:26px;font-weight:800;-webkit-text-stroke:1px #000">Prof Powell</span>
      <span slot="text-2" style="color:#fde68a;font-size:14px;font-weight:600">LEVEL 42 · WEB WIZARD</span>
      <img slot="image-2" src="https://picsum.photos/seed/b1/64/64" crossorigin="anonymous" width="44" height="44" alt="">
      <img slot="image-3" src="https://picsum.photos/seed/b2/64/64" crossorigin="anonymous" width="44" height="44" alt="">
      <img slot="image-4" src="https://picsum.photos/seed/b3/64/64" crossorigin="anonymous" width="44" height="44" alt="">
    </canvas-text>
    <button id="dl">Download PNG</button>
  </main>
  <script type="module">
    const el = document.querySelector('canvas-text');
    document.getElementById('dl').addEventListener('click', async () => {
      const blob = await el.toBlob('image/png');
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'badge.png'; a.click(); URL.revokeObjectURL(a.href);
    });
  </script>
  <script type="module" src="./docs-entry.js"></script>
</body>
</html>
